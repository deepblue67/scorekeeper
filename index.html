// ── EXPORT / IMPORT ─────────────────────────────────────────
function showExport(){
  const exportData = {
    version: 1,
    exported: new Date().toISOString(),
    games: D.games,
    players: D.players,
    sessions: D.sessions
  };
  const json = JSON.stringify(exportData);
  const b64 = btoa(unescape(encodeURIComponent(json)));
  const code = "SK1:" + b64;

  showModal((sheet, close) => {
    sheet.appendChild(div("mtitle", "📤 Exporter mes données"));

    // Info
    const info = div("");
    info.style.cssText = "font-size:13px;color:var(--muted);margin-bottom:16px;line-height:1.6;text-align:center";
    info.textContent = D.sessions.length + " partie(s) · " + D.players.length + " joueur(s) · " + D.games.length + " jeu(x)";
    sheet.appendChild(info);

    // Tab bar
    let exportTab = "qr";
    const tabBar = div("tabbar");
    tabBar.style.marginBottom = "16px";
    ["qr","text"].forEach(t => {
      const tb = el("button","tab"+(exportTab===t?" on":""), t==="qr"?"📷 QR Code":"📋 Texte");
      tb.onclick = () => {
        exportTab = t;
        tabBar.querySelectorAll(".tab").forEach((b,i) => b.className = "tab"+(["qr","text"][i]===t?" on":""));
        qrSection.style.display = t==="qr" ? "block" : "none";
        textSection.style.display = t==="text" ? "block" : "none";
      };
      tabBar.appendChild(tb);
    });
    sheet.appendChild(tabBar);

    // QR Code section
    const qrSection = div("");
    qrSection.style.cssText = "text-align:center";
    const qrHint = div("");
    qrHint.style.cssText = "font-size:12px;color:var(--muted);margin-bottom:12px";

    // Check size
    if(code.length > 2900){
      qrHint.textContent = "⚠️ Données trop volumineuses pour un QR Code (" + Math.round(code.length/1024*10)/10 + " Ko). Utilisez le mode texte.";
      qrHint.style.color = "#c03030";
      qrSection.appendChild(qrHint);
    } else {
      qrHint.textContent = "Scannez avec l'appareil photo de l'autre appareil";
      qrSection.appendChild(qrHint);
      const qrDiv = div("");
      qrDiv.style.cssText = "display:inline-block;background:#fff;padding:16px;border-radius:14px;margin-bottom:12px";
      qrSection.appendChild(qrDiv);
      setTimeout(() => {
        try {
          new QRCode(qrDiv, {
            text: code,
            width: 220, height: 220,
            colorDark: "#1e3d3a",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.M
          });
        } catch(e) {
          qrDiv.innerHTML = "<div style='padding:20px;font-size:13px;color:#c03030'>Erreur QR Code</div>";
        }
      }, 100);
    }
    sheet.appendChild(qrSection);

    // Text section
    const textSection = div("");
    textSection.style.display = "none";
    const hint2 = div("");
    hint2.style.cssText = "font-size:12px;color:var(--muted);margin-bottom:10px;text-align:center";
    hint2.textContent = "Copiez ce code et envoyez-le à l'autre appareil";
    textSection.appendChild(hint2);

    const codeBox = el("textarea","inp","");
    codeBox.value = code;
    codeBox.readOnly = true;
    codeBox.style.cssText = "width:100%;height:90px;font-size:10px;font-family:monospace;resize:none;margin-bottom:10px;word-break:break-all";
    textSection.appendChild(codeBox);

    const copyBtn = btn("btn btn-p btn-full","📋 Copier le code", () => {
      navigator.clipboard.writeText(code).then(() => {
        copyBtn.textContent = "✓ Copié !";
        setTimeout(() => copyBtn.textContent = "📋 Copier le code", 2000);
      }).catch(() => {
        codeBox.select();
        document.execCommand("copy");
        copyBtn.textContent = "✓ Copié !";
        setTimeout(() => copyBtn.textContent = "📋 Copier le code", 2000);
      });
    });
    textSection.appendChild(copyBtn);

    // Share via native share
    if(navigator.share){
      const shareBtn2 = btn("btn btn-s btn-full","🔗 Partager via...", () => {
        navigator.share({ title:"ScoreKeeper — Export", text: code });
      });
      shareBtn2.style.marginTop = "8px";
      textSection.appendChild(shareBtn2);
    }

    sheet.appendChild(textSection);
    sheet.appendChild(btn("btn btn-g btn-full","Fermer", close));
  });
}

function showImport(){
  showModal((sheet, close) => {
    sheet.appendChild(div("mtitle","📥 Importer des données"));

    const info = div("");
    info.style.cssText = "font-size:13px;color:var(--muted);margin-bottom:16px;line-height:1.6;text-align:center";
    info.textContent = "Collez le code reçu de l'autre appareil. ⚠️ Cela remplacera joueurs, jeux et historique.";
    sheet.appendChild(info);

    const inp = el("textarea","inp","");
    inp.placeholder = "Collez le code SK1:... ici";
    inp.style.cssText = "width:100%;height:100px;font-size:11px;font-family:monospace;resize:none;margin-bottom:12px;word-break:break-all";
    sheet.appendChild(inp);

    const errDiv = div("");
    errDiv.style.cssText = "font-size:13px;color:#c03030;margin-bottom:10px;text-align:center;min-height:20px";
    sheet.appendChild(errDiv);

    const importBtn = btn("btn btn-p btn-full","✓ Importer", () => {
      const raw = inp.value.trim();
      if(!raw.startsWith("SK1:")){
        errDiv.textContent = "Code invalide. Doit commencer par SK1:";
        return;
      }
      try {
        const json = decodeURIComponent(escape(atob(raw.slice(4))));
        const data = JSON.parse(json);
        const validationError=validateImportData(data);
        if(validationError){
          errDiv.textContent = validationError;
          return;
        }
        if(confirm("Importer " + data.sessions.length + " partie(s), " + data.players.length + " joueur(s) et " + data.games.length + " jeu(x) ? Vos données actuelles seront remplacées.")){
          try{
            const previous=localStorage.getItem(KEY);
            if(previous)localStorage.setItem(KEY+"_backup",previous);
          }catch(e){
            console.error("[Import] Échec de la sauvegarde de sécurité",e);
            errDiv.textContent="Impossible de créer la sauvegarde de sécurité. Import annulé.";
            return;
          }
          const imported=upd(d => ({
            ...d,
            games: data.games,
            players: data.players,
            sessions: data.sessions,
            current: d.current // keep current game
          }));
          if(!imported){
            errDiv.textContent="Import annulé : les données n'ont pas pu être enregistrées.";
            return;
          }
          close();
          alert("✅ Import réussi !");
          buildSettings(document.getElementById("p-settings"));
        }
      } catch(e) {
        errDiv.textContent = "Erreur de décodage: " + e.message;
      }
    });
    sheet.appendChild(importBtn);
    sheet.appendChild(btn("btn btn-g btn-full","Annuler", close));
  });
}

// ── EDIT PLAYER ────────────────────────────────────────────
function showEditPlayer(player, onDone){
  let editEmoji = player.emoji;
  let editGroups = [...(player.groups||[])];

  showModal((sheet,close)=>{
    sheet.appendChild(div("mtitle","✏️ Modifier le joueur"));

    // Emoji + name row
    const topRow=div("");
    topRow.style.cssText="display:flex;gap:10px;align-items:center;margin-bottom:14px";
    const emojiBtn=document.createElement("button");
    emojiBtn.style.cssText="width:52px;height:52px;font-size:24px;border-radius:14px;background:var(--surface);border:none;box-shadow:var(--shadow);cursor:pointer;flex-shrink:0";
    emojiBtn.textContent=editEmoji;
    emojiBtn.onclick=()=>showEmojiPicker(emoji=>{
      editEmoji=emoji;
      emojiBtn.textContent=emoji;
    });

    const nameInp=el("input","inp","",{type:"text"});
    nameInp.value=player.name;
    nameInp.style.flex="1";

    topRow.appendChild(emojiBtn);
    topRow.appendChild(nameInp);
    sheet.appendChild(topRow);

    // Groups
    const grpLbl=div("");
    grpLbl.style.cssText="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:8px";
    grpLbl.textContent="Groupes";
    sheet.appendChild(grpLbl);

    const grpRow=div("");
    grpRow.style.cssText="display:flex;gap:7px;flex-wrap:wrap;margin-bottom:18px";
    function refreshGrpBtns(){
      renderGroupButtons(grpRow,editGroups,nextGroups=>{
        editGroups=nextGroups;
        refreshGrpBtns();
      },"8px 14px");
    }
    refreshGrpBtns();
    sheet.appendChild(grpRow);

    // Save
    const saveBtn=btn("btn btn-p btn-full","✓ Enregistrer",()=>{
      if(!nameInp.value.trim())return;
      upd(d=>({...d,players:d.players.map(p=>
        p.id===player.id ? {...p, name:nameInp.value.trim(), emoji:editEmoji, groups:editGroups} : p
      )}));
      close(); onDone();
    });
    sheet.appendChild(saveBtn);
  });
}

// ── BOOT ──────────────────────────────────────────────────────
render();
applyTheme(currentTheme);
goTab("home");

// ── SERVICE WORKER ────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('[SW] Enregistré :', reg.scope))
      .catch(err => console.warn('[SW] Échec enregistrement :', err));
  });
}
