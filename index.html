<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
:root{
  --bg:#e8f4f3;
  --surface:#ffffff;
  --surface2:#d6eeec;
  --surface3:#c0e4e1;
  --border:rgba(46,125,120,0.14);
  --accent:#2e7d78;--accent2:#1a5c58;--accent-lt:#e0f2f0;
  --text:#0d3330;--muted:rgba(13,51,48,0.52);--dim:rgba(13,51,48,0.28);
  --shadow:0 2px 8px rgba(46,125,120,0.10);
  --shadow-m:0 4px 20px rgba(46,125,120,0.14);
  --r:20px;--rs:50px;
  --safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px)
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;font-size:15px;touch-action:manipulation;-webkit-text-size-adjust:100%}
button{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;cursor:pointer;border:none;transition:all .18s cubic-bezier(.34,1.56,.64,1)}
button:active{transform:scale(.95)}
input,select{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;font-size:15px}

/* APP SHELL */
#app{display:flex;flex-direction:column;height:100%;overflow:hidden}
#pages{flex:1;overflow:hidden;position:relative}
.page{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;display:none}
.page.active{display:block}
.inner{padding:0 16px calc(20px + var(--safe-bot))}

/* NAV — pill flottante */
nav{
  flex-shrink:0;display:flex;
  background:var(--surface);
  border-top:none;
  box-shadow:0 -1px 0 rgba(46,125,120,0.08), 0 -4px 24px rgba(46,125,120,0.10);
  border-radius:24px 24px 0 0;
  padding:6px 8px 0;
}
.nb{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:8px 4px calc(10px + var(--safe-bot));
  background:none;border:none;color:var(--muted);
  font-size:10px;font-weight:600;letter-spacing:.03em;text-transform:uppercase;
  border-radius:16px;transition:all .2s;
}
.nb svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;transition:all .2s}
.nb.on{color:var(--accent)}
.nb.on svg{stroke:var(--accent);stroke-width:2.2}
.nb-dot{
  width:28px;height:3px;border-radius:99px;
  background:var(--accent);opacity:0;
  transition:opacity .2s;margin-top:-2px;margin-bottom:2px;
}
.nb.on .nb-dot{opacity:1}

/* HEADER */
.hdr{padding:calc(var(--safe-top) + 20px) 16px 14px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg);z-index:10}
.hdr-logo{width:38px;height:38px;border-radius:14px;object-fit:contain}
h1{font-size:28px;font-weight:800;letter-spacing:-.04em;color:var(--text)}
.sub{font-size:12px;color:var(--muted);margin-top:2px;font-weight:500}

/* CARD — Material You : pas de bordure, élévation douce */
.card{
  background:var(--surface);
  border:none;
  border-radius:var(--r);
  padding:18px;margin-bottom:12px;
  box-shadow:var(--shadow);
}
.ctitle{
  font-size:11px;font-weight:700;text-transform:uppercase;
  letter-spacing:.1em;color:var(--accent);margin-bottom:14px;
  display:flex;align-items:center;gap:6px;
}
.ctitle::before{content:'';width:3px;height:11px;background:var(--accent);border-radius:99px;display:inline-block}

/* BUTTONS — pills généreuses */
.btn{
  display:flex;align-items:center;justify-content:center;gap:8px;
  border-radius:var(--rs);font-weight:700;font-size:15px;padding:14px 22px;
  letter-spacing:.01em;
}
.btn-p{
  background:var(--accent);color:#fff;
  box-shadow:0 4px 18px rgba(46,125,120,.32);
}
.btn-p:hover{background:#236460;box-shadow:0 6px 22px rgba(46,125,120,.38)}
.btn-s{
  background:var(--accent-lt);color:var(--accent);
  border:none;
}
.btn-s:hover{background:var(--surface3)}
.btn-d{background:rgba(180,40,40,.1);color:#b03030}
.btn-g{background:none;color:var(--muted);border:none}
.btn-full{width:100%}
.btn-sm{padding:8px 16px;font-size:13px}
.btn-ico{
  width:40px;height:40px;padding:0;
  border-radius:14px;
  background:var(--accent-lt);color:var(--accent);
}
.btn[disabled]{opacity:.4;pointer-events:none}

/* INPUTS — fond coloré, sans bordure visible */
.inp{
  width:100%;
  background:var(--surface);
  border:2px solid transparent;
  border-radius:16px;
  color:var(--text);font-size:16px;
  padding:14px 16px;
  -webkit-appearance:none;outline:none;
  box-shadow:var(--shadow);
  transition:border-color .18s, box-shadow .18s;
}
.inp:focus{border-color:var(--accent);box-shadow:0 0 0 4px rgba(46,125,120,.12)}
.inp::placeholder{color:var(--dim)}
.inp[type="date"]::-webkit-calendar-picker-indicator{opacity:0.5;cursor:pointer}
.lbl{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--accent);margin-bottom:7px}
.fg{margin-bottom:16px}

/* TABS — pill container */
.tabbar{
  display:flex;gap:4px;
  background:var(--surface);
  border-radius:16px;padding:4px;margin-bottom:16px;
  box-shadow:var(--shadow);
}
.tab{
  flex:1;padding:9px 6px;text-align:center;
  border-radius:13px;font-size:13px;font-weight:600;cursor:pointer;
  color:var(--muted);transition:all .2s;border:none;background:none;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
}
.tab.on{
  background:var(--accent);color:#fff;
  box-shadow:0 2px 10px rgba(46,125,120,.25);
}

/* RANK — cartes généreuses */
.rank-item{
  display:flex;align-items:center;gap:13px;
  padding:14px 16px;
  background:var(--surface);
  border:none;
  border-radius:18px;margin-bottom:9px;
  box-shadow:var(--shadow);
  transition:box-shadow .18s;
}
.rank-item.r1{
  background:linear-gradient(135deg,#fffbe8 0%,#fff9d6 100%);
  box-shadow:0 4px 18px rgba(200,160,0,.15);
}
.rank-item.r2{background:linear-gradient(135deg,#f5f5f5 0%,#ebebeb 100%)}
.rank-item.r3{background:linear-gradient(135deg,#fdf0e8 0%,#f8e4d0 100%)}
.rank-badge{
  width:36px;height:36px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-family:SFMono-Regular,Consolas,Liberation Mono,monospace;flex-shrink:0;font-weight:700;
}
.rb1{background:rgba(212,168,0,.22);color:#9a7800}
.rb2{background:rgba(160,160,160,.22);color:#6a6a60}
.rb3{background:rgba(192,120,64,.22);color:#a05818}
.rbn{background:var(--surface2);color:var(--muted)}
.rank-name{flex:1;font-weight:700;font-size:15px;color:var(--text)}
.rank-score{
  font-family:SFMono-Regular,Consolas,Liberation Mono,monospace;font-size:22px;font-weight:700;
  color:var(--accent);
  background:var(--accent-lt);
  padding:4px 11px;border-radius:10px;
}

/* SCORE ROW */
.score-row{
  display:flex;align-items:center;gap:12px;
  padding:14px 16px;
  background:var(--surface);
  border:none;
  border-radius:18px;margin-bottom:9px;
  cursor:pointer;box-shadow:var(--shadow);
  transition:all .18s;
}
.score-row:active{transform:scale(.98);box-shadow:var(--shadow-m)}
.sr-name{flex:1;font-weight:700;font-size:15px}
.sr-rounds{font-size:11px;color:var(--muted);font-weight:500}
.sr-total{
  font-family:SFMono-Regular,Consolas,Liberation Mono,monospace;font-size:22px;font-weight:700;
  min-width:55px;text-align:right;color:var(--accent);
}
.sr-arr{font-size:17px;color:var(--muted);margin-left:4px;opacity:.6}

/* AVATAR */
.av{width:38px;height:38px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.av0{background:#c0e8e4}.av1{background:#cce8c0}.av2{background:#f0e0c0}.av3{background:#c0d4f0}.av4{background:#f0c0d4}.av5{background:#e0d0f0}

/* BADGE — pill colorée */
.badge{display:inline-flex;align-items:center;padding:4px 12px;border-radius:99px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.ba{background:rgba(46,125,120,.15);color:var(--accent2)}
.bb{background:var(--accent-lt);color:var(--accent)}

/* STATUS BAR */
.statusbar{
  display:flex;align-items:center;gap:10px;
  padding:12px 16px;
  background:var(--accent-lt);
  border:none;
  border-radius:16px;margin-bottom:16px;
}
.sdot{width:8px;height:8px;border-radius:50%;background:var(--accent);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* SECTION LABEL */
.slbl{
  font-size:12px;font-weight:700;text-transform:uppercase;
  letter-spacing:.1em;color:var(--accent);
  margin:20px 0 10px;
}

/* STAT CARD */
.stat-card{
  background:var(--surface);border:none;
  border-radius:var(--r);padding:16px;
  display:flex;flex-direction:column;gap:4px;
  box-shadow:var(--shadow);
}
.sv{font-family:SFMono-Regular,Consolas,Liberation Mono,monospace;font-size:26px;font-weight:700;color:var(--accent)}
.sl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;font-weight:600}

/* HISTORY */
.hist{
  background:var(--surface);border:none;
  border-radius:var(--r);padding:16px;margin-bottom:10px;
  cursor:pointer;box-shadow:var(--shadow);transition:all .18s;
}
.hist:active{transform:scale(.98)}
.hist-name{font-size:16px;font-weight:700}
.hist-meta{font-size:12px;color:var(--muted);margin-top:3px;font-weight:500}
.hist-winner{
  display:flex;align-items:center;gap:8px;
  margin-top:12px;padding-top:12px;
  border-top:1.5px solid var(--border);
}

/* NUMPAD */
.numpad-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-top:14px}
.nk{
  height:64px;border-radius:18px;border:none;
  background:var(--surface);color:var(--text);
  font-size:24px;font-family:SFMono-Regular,Consolas,Liberation Mono,monospace;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  box-shadow:var(--shadow);transition:all .15s cubic-bezier(.34,1.56,.64,1);
  font-weight:600;
}
.nk:active{background:var(--accent);color:#fff;transform:scale(.93)}
.ndisp{
  background:var(--surface);
  border:2px solid transparent;
  border-radius:18px;padding:15px;
  text-align:center;font-family:SFMono-Regular,Consolas,Liberation Mono,monospace;font-size:46px;font-weight:700;
  min-height:76px;display:flex;align-items:center;justify-content:center;
  color:var(--accent);box-shadow:var(--shadow);
}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.28);z-index:100;display:flex;align-items:flex-end;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.sheet{
  background:var(--surface);
  border-radius:28px 28px 0 0;
  padding:24px 18px calc(24px + var(--safe-bot));
  width:100%;max-height:82vh;overflow-y:auto;-webkit-overflow-scrolling:touch;
  box-shadow:0 -8px 40px rgba(46,125,120,.18);
}
.handle{width:40px;height:4px;background:var(--surface3);border-radius:99px;margin:0 auto 20px}
.mtitle{font-size:20px;font-weight:800;margin-bottom:18px;letter-spacing:-.02em}

/* ACTIVE BANNER */
.active-banner{
  background:var(--accent-lt);border:none;
  border-radius:16px;padding:13px 16px;margin-bottom:15px;
  display:flex;align-items:center;justify-content:space-between;
}

/* ROUND PILL */
.rpill{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--accent);color:#fff;
  border:none;border-radius:99px;padding:7px 16px;
  font-size:13px;font-weight:700;
  box-shadow:0 2px 10px rgba(46,125,120,.25);
}

/* EMPTY */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;text-align:center;gap:12px}
.empty-ico{font-size:50px;margin-bottom:4px}

/* TABLE */
.dtable{width:100%;border-collapse:separate;border-spacing:0;font-size:13px}
.dtable th{
  text-align:left;padding:6px 8px;
  color:var(--accent);font-weight:700;white-space:nowrap;
  font-size:11px;text-transform:uppercase;letter-spacing:.06em;
}
.dtable td{
  padding:10px 8px;border-top:1.5px solid var(--border);
  font-family:SFMono-Regular,Consolas,Liberation Mono,monospace;white-space:nowrap;
}
.dtable td:first-child,
.dtable th:first-child{
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;font-weight:700;
  position:sticky;left:0;z-index:2;
  background:var(--surface);
  border-right:2px solid var(--border);
  padding-right:10px;
  min-width:90px;max-width:110px;
}
.dtable th:first-child{background:var(--surface)}

/* CHIP */
.chip{
  display:inline-flex;align-items:center;gap:6px;
  padding:7px 14px;
  background:var(--surface);border:none;
  border-radius:99px;font-size:13px;font-weight:600;
  box-shadow:var(--shadow);
}
.chip.on{background:var(--accent);color:#fff}

/* CONFETTI */
.cf{position:fixed;pointer-events:none;z-index:200;border-radius:3px;animation:cffall 3s ease-in forwards}
@keyframes cffall{0%{transform:translateY(-10px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}

/* GRID */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}

@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fadeUp .32s cubic-bezier(.16,1,.3,1) both}

/* ── TEAL / SOFT MODERN ─────────────────────────────────── */
[data-theme="teal"] body{background:#f4f7f6}
[data-theme="teal"] .inner{padding-left:20px;padding-right:20px}
[data-theme="teal"] .hdr{
  padding:calc(var(--safe-top) + 24px) 0 20px;
  position:relative;background:transparent
}
[data-theme="teal"] h1{font-size:30px;font-weight:760;letter-spacing:-.045em}
[data-theme="teal"] .sub{font-size:13px;margin-top:4px;color:var(--muted)}
[data-theme="teal"] .hdr-logo{
  width:44px;height:44px;border-radius:15px;
  background:var(--surface);padding:4px;
  box-shadow:0 6px 20px rgba(22,58,54,.09)
}
[data-theme="teal"] .card{
  border:1px solid var(--border);border-radius:18px;
  padding:20px;margin-bottom:14px;
  box-shadow:0 8px 28px rgba(22,58,54,.055)
}
[data-theme="teal"] .ctitle{
  color:var(--text);font-size:12px;letter-spacing:.075em;
  margin-bottom:16px
}
[data-theme="teal"] .ctitle::before{width:4px;height:14px}
[data-theme="teal"] .btn{
  min-height:50px;border-radius:14px;padding:13px 20px;
  font-size:15px;font-weight:680;letter-spacing:0;
  transition:transform .16s ease,background .16s ease,box-shadow .16s ease
}
[data-theme="teal"] .btn:active{transform:scale(.98)}
[data-theme="teal"] .btn-p{
  background:var(--accent);
  box-shadow:0 7px 18px rgba(20,125,115,.20)
}
[data-theme="teal"] .btn-p:hover{
  background:var(--accent2);
  box-shadow:0 9px 22px rgba(20,125,115,.24)
}
[data-theme="teal"] .btn-s{
  background:var(--accent-lt);color:var(--accent2);
  border:1px solid rgba(20,125,115,.08)
}
[data-theme="teal"] .btn-g{border-radius:12px}
[data-theme="teal"] .btn-sm{
  min-height:38px;border-radius:11px;padding:8px 14px;font-size:13px
}
[data-theme="teal"] .btn-ico{min-height:44px;width:44px;height:44px;padding:0}
[data-theme="teal"] .inp,
[data-theme="teal"] #game-sel{
  min-height:52px;background:var(--surface2)!important;
  border:1px solid transparent!important;border-radius:14px!important;
  padding:14px 15px!important;box-shadow:none!important;
  font-size:15px!important
}
[data-theme="teal"] .inp:focus{
  background:var(--surface)!important;border-color:var(--accent)!important;
  box-shadow:0 0 0 4px rgba(20,125,115,.10)!important
}
[data-theme="teal"] .lbl{
  color:var(--muted);font-size:11px;letter-spacing:.09em;margin-bottom:8px
}
[data-theme="teal"] .fg{margin-bottom:18px}
[data-theme="teal"] .active-banner{
  border:1px solid rgba(20,125,115,.10);
  border-radius:16px;padding:14px 16px;margin-bottom:16px
}
[data-theme="teal"] .tabbar{
  gap:3px;background:var(--surface2);
  border-radius:14px;padding:4px;box-shadow:none
}
[data-theme="teal"] .tab{border-radius:11px;padding:10px 6px}
[data-theme="teal"] .tab.on{
  background:var(--surface);color:var(--accent2);
  box-shadow:0 3px 10px rgba(22,58,54,.08)
}
[data-theme="teal"] .statusbar{
  background:var(--surface);border:1px solid var(--border);
  border-radius:14px;padding:13px 15px
}
[data-theme="teal"] .score-row,
[data-theme="teal"] .rank-item,
[data-theme="teal"] .hist{
  border:1px solid var(--border);border-radius:16px;
  box-shadow:0 5px 18px rgba(22,58,54,.045)
}
[data-theme="teal"] .score-row{padding:15px 16px}
[data-theme="teal"] .rank-item{padding:15px 16px}
[data-theme="teal"] .rank-score{
  background:transparent;padding:0;border-radius:0
}
[data-theme="teal"] .stat-card{
  border:1px solid var(--border);border-radius:16px;
  box-shadow:0 5px 18px rgba(22,58,54,.045)
}
[data-theme="teal"] .slbl{
  color:var(--muted);font-size:11px;letter-spacing:.11em;
  margin:24px 2px 10px
}
[data-theme="teal"] .chip{
  border:1px solid var(--border);border-radius:12px;
  box-shadow:none;padding:8px 12px
}
[data-theme="teal"] .rpill{
  border-radius:12px;padding:8px 13px;
  box-shadow:0 5px 14px rgba(20,125,115,.16)
}
[data-theme="teal"] .overlay{
  background:rgba(15,32,30,.34);
  backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px)
}
[data-theme="teal"] .sheet{
  border-radius:24px 24px 0 0;padding:20px 20px calc(24px + var(--safe-bot));
  box-shadow:0 -16px 50px rgba(15,32,30,.16)
}
[data-theme="teal"] .handle{
  width:36px;height:4px;background:rgba(22,43,41,.16);margin-bottom:22px
}
[data-theme="teal"] .mtitle{font-size:21px;font-weight:760;margin-bottom:20px}
[data-theme="teal"] .ndisp{
  background:var(--surface2);border:1px solid transparent;
  border-radius:16px;box-shadow:none
}
[data-theme="teal"] .nk{
  height:62px;border:1px solid var(--border);border-radius:15px;
  box-shadow:0 3px 12px rgba(22,58,54,.04);font-weight:560
}
[data-theme="teal"] nav{
  padding:8px 10px 2px;border-radius:20px 20px 0 0;
  border-top:1px solid var(--border);
  box-shadow:0 -8px 30px rgba(22,58,54,.07)
}
[data-theme="teal"] .nb{
  gap:3px;padding:7px 3px calc(9px + var(--safe-bot));
  border-radius:13px;font-size:10px;font-weight:620;
  letter-spacing:0;text-transform:none
}
[data-theme="teal"] .nb.on{background:var(--accent-lt);color:var(--accent2)}
[data-theme="teal"] .nb svg{width:21px;height:21px}
[data-theme="teal"] .nb-dot{display:none}

/* ── PC LAYOUT (>= 1280px) ── */
@media (min-width: 1280px) {
  html, body { overflow: auto; }
  #app { width: 100%; max-width: 100%; min-height: 100vh; }
  .inner {
    max-width: 960px;
    margin: 0 auto;
    padding-left: 48px;
    padding-right: 48px;
  }
  .hdr {
    max-width: 960px;
    margin-left: auto;
    margin-right: auto;
    padding-left: 48px;
    padding-right: 48px;
  }
  h1 { font-size: 36px !important; }
  .sub { font-size: 15px !important; }
  .card { padding: 26px; margin-bottom: 16px; }
  .btn { font-size: 16px; padding: 16px 24px; }
  .btn-sm { padding: 9px 18px; font-size: 14px; }
  .inp { font-size: 17px; padding: 16px 18px; }
  .rank-item { padding: 18px 22px; margin-bottom: 10px; }
  .rank-name { font-size: 18px; }

  .score-row { padding: 18px 22px; margin-bottom: 10px; }
  .sr-name { font-size: 17px; }
  .sr-total { font-size: 26px; }
  .nb { font-size: 11px; padding: 10px 8px calc(10px + var(--safe-bot)); }
  .nb svg { width: 26px; height: 26px; }
  .nk { height: 74px; font-size: 28px; }
  .ndisp { font-size: 54px; min-height: 88px; }
  .dtable { font-size: 15px; }
  .dtable td, .dtable th { padding: 12px 10px; }
  .page { scrollbar-width: thin; scrollbar-color: rgba(128,128,128,0.3) transparent; }

}

<div id="app">
  <div id="pages">
    <div class="page active" id="p-home"></div>
    <div class="page" id="p-game"></div>
    <div class="page" id="p-history"></div>
    <div class="page" id="p-stats"></div>
    <div class="page" id="p-settings"></div>
  </div>
  <nav id="nav"></nav>
</div>
<div id="modal-root"></div>

<script>

// ── VERSION ─────────────────────────────────────────────────
const APP_VERSION = 'V20260611 23H13';

// ── THEMES ─────────────────────────────────────────────────
const THEMES = [
  {
    // Material — fond vert eau très doux, cards blanches, accent teal (thème Material You)
    id:"material", name:"Material", icon:"🎨",
    bg:"#e8f4f3", surface:"#ffffff", surface2:"#d6eeec",
    border:"rgba(46,125,120,0.14)", accent:"#2e7d78", accent2:"#1a5c58",
    text:"#0d3330", muted:"rgba(13,51,48,0.52)", dim:"rgba(13,51,48,0.28)",
    shadow:"0 2px 8px rgba(46,125,120,0.10)", navBg:"#ffffff", accentLt:"#e0f2f0"
  },
  {
    // Teal — identité Soft Modern claire, calme et tactile
    id:"teal", name:"Teal", icon:"🌊",
    bg:"#f4f7f6", surface:"#ffffff", surface2:"#edf3f1",
    border:"rgba(22,58,54,0.10)", accent:"#147d73", accent2:"#0d5f58",
    text:"#162b29", muted:"rgba(22,43,41,0.60)", dim:"rgba(22,43,41,0.34)",
    shadow:"0 8px 28px rgba(22,58,54,0.07)", navBg:"#ffffff", accentLt:"#dff2ef"
  },
  {
    // Nuit — fond bleu nuit, cartes bleu ardoise, texte blanc
    id:"night", name:"Nuit", icon:"🌙",
    bg:"#1a2744", surface:"#243158", surface2:"#1e2a4e",
    border:"rgba(120,160,240,0.18)", accent:"#5b8dee", accent2:"#7aaaf5",
    text:"#e8eeff", muted:"rgba(200,215,255,0.55)", dim:"rgba(200,215,255,0.28)",
    shadow:"0 2px 12px rgba(0,0,0,0.30)", navBg:"#1e2a4e", accentLt:"#1e2d54"
  },
  {
    // Sunset — fond orange brûlé, cartes crème, texte brun très foncé
    id:"sunset", name:"Sunset", icon:"🌅",
    bg:"#c45e2a", surface:"#fdf5ec", surface2:"#f5e6d4",
    border:"rgba(140,60,20,0.14)", accent:"#9e3d10", accent2:"#c45e2a",
    text:"#2c1206", muted:"rgba(44,18,6,0.52)", dim:"rgba(44,18,6,0.28)",
    shadow:"0 2px 10px rgba(140,60,20,0.15)", navBg:"#fdf5ec", accentLt:"#fae8d4"
  },
  {
    // Candy — fond rose vif, cartes blanc rosé, texte bordeaux foncé
    id:"candy", name:"Candy", icon:"🍬",
    bg:"#d94f8a", surface:"#fff0f6", surface2:"#fad8ea",
    border:"rgba(160,30,90,0.14)", accent:"#9c1a5e", accent2:"#c2246e",
    text:"#2e0a1c", muted:"rgba(46,10,28,0.52)", dim:"rgba(46,10,28,0.28)",
    shadow:"0 2px 10px rgba(160,30,90,0.15)", navBg:"#fff0f6", accentLt:"#fde0ee"
  },
  {
    // Jungle — fond vert forêt, cartes vert très pâle, texte vert très foncé
    id:"jungle", name:"Jungle", icon:"🌿",
    bg:"#2d6b4a", surface:"#eef7f0", surface2:"#d8eddc",
    border:"rgba(20,80,40,0.14)", accent:"#1a4d30", accent2:"#2a6640",
    text:"#0e2a1c", muted:"rgba(14,42,28,0.52)", dim:"rgba(14,42,28,0.28)",
    shadow:"0 2px 10px rgba(20,80,40,0.14)", navBg:"#eef7f0", accentLt:"#d4edda"
  },
  {
    // Fiesta — fond jaune doré, cartes blanc chaud, texte brun foncé
    id:"fiesta", name:"Fiesta", icon:"🎆",
    bg:"#d4920a", surface:"#fffbf0", surface2:"#fdf0cc",
    border:"rgba(140,80,0,0.14)", accent:"#8a5c00", accent2:"#b07800",
    text:"#2a1c00", muted:"rgba(42,28,0,0.52)", dim:"rgba(42,28,0,0.28)",
    shadow:"0 2px 10px rgba(140,80,0,0.14)", navBg:"#fffbf0", accentLt:"#fef3cc"
  },
  {
    // Myrtille — fond violet profond, cartes lavande très pâle, texte violet très foncé
    id:"myrtille", name:"Myrtille", icon:"🫐",
    bg:"#5c2d91", surface:"#f5f0ff", surface2:"#e8deff",
    border:"rgba(70,20,130,0.14)", accent:"#6d28d9", accent2:"#7c3aed",
    text:"#1e0a40", muted:"rgba(30,10,64,0.52)", dim:"rgba(30,10,64,0.28)",
    shadow:"0 2px 10px rgba(70,20,130,0.15)", navBg:"#f5f0ff", accentLt:"#ede0ff"
  },
  {
    // Plage — fond bleu lagon, cartes sable très pâle, texte bleu marine foncé
    id:"plage", name:"Plage", icon:"🏖️",
    bg:"#0090a8", surface:"#f8f4e8", surface2:"#ede8d4",
    border:"rgba(0,100,120,0.14)", accent:"#006478", accent2:"#007d96",
    text:"#00202a", muted:"rgba(0,32,42,0.52)", dim:"rgba(0,32,42,0.28)",
    shadow:"0 2px 10px rgba(0,100,120,0.15)", navBg:"#f8f4e8", accentLt:"#d8eef0"
  },
  {
    // Agrume — fond orange vif, cartes blanc ivoire, texte brun très foncé
    id:"agrume", name:"Agrume", icon:"🍊",
    bg:"#e06c00", surface:"#fffcf0", surface2:"#fdefd0",
    border:"rgba(160,70,0,0.14)", accent:"#a04800", accent2:"#c05a00",
    text:"#2a1400", muted:"rgba(42,20,0,0.52)", dim:"rgba(42,20,0,0.28)",
    shadow:"0 2px 10px rgba(160,70,0,0.15)", navBg:"#fffcf0", accentLt:"#fdefd0"
  },
  {
    // Sakura — fond rose poudré, cartes blanc rosé très pâle, texte rose très foncé
    id:"sakura", name:"Sakura", icon:"🌸",
    bg:"#c8688a", surface:"#fff8fa", surface2:"#fce8f0",
    border:"rgba(150,50,90,0.14)", accent:"#8c2252", accent2:"#a8285e",
    text:"#2a0618", muted:"rgba(42,6,24,0.52)", dim:"rgba(42,6,24,0.28)",
    shadow:"0 2px 10px rgba(150,50,90,0.14)", navBg:"#fff8fa", accentLt:"#fce8f0"
  },
  {
    // Minuit — fond noir profond, cartes gris anthracite, texte blanc doré
    id:"minuit", name:"Minuit", icon:"🎭",
    bg:"#0d0d14", surface:"#1c1c2e", surface2:"#14141f",
    border:"rgba(220,180,60,0.22)", accent:"#c8920e", accent2:"#e0aa1a",
    text:"#f0e8d0", muted:"rgba(240,232,208,0.52)", dim:"rgba(240,232,208,0.25)",
    shadow:"0 2px 14px rgba(0,0,0,0.45)", navBg:"#1c1c2e", accentLt:"#2a2210"
  }
];

let currentTheme = "teal";
try{currentTheme=localStorage.getItem("sk_theme")||currentTheme}catch(e){
  console.warn("[Stockage] Préférence de thème indisponible",e)
}

function applyTheme(id) {
  const t = THEMES.find(x => x.id === id) || THEMES[0];
  currentTheme = id;
  document.documentElement.dataset.theme = t.id;
  try{localStorage.setItem("sk_theme",id)}catch(e){
    console.warn("[Stockage] Thème non mémorisé",e)
  }
  const r = document.documentElement.style;
  r.setProperty("--bg", t.bg);
  r.setProperty("--surface", t.surface);
  r.setProperty("--surface2", t.surface2);
  r.setProperty("--surface3", t.surface2);
  r.setProperty("--border", t.border);
  r.setProperty("--accent", t.accent);
  r.setProperty("--accent2", t.accent2);
  r.setProperty("--accent-lt", t.accentLt || t.surface2);
  r.setProperty("--text", t.text);
  r.setProperty("--muted", t.muted);
  r.setProperty("--dim", t.dim);
  r.setProperty("--shadow", t.shadow);
  // nav bg
  const nav = document.querySelector("nav");
  if(nav) nav.style.background = t.navBg || t.surface;
  // page header backgrounds
  document.querySelectorAll(".hdr").forEach(h => h.style.background = t.bg);
  // meta theme-color
  const tm = document.querySelector('meta[name="theme-color"]');
  if(tm) tm.content = t.bg;
  // Force date inputs to use theme colors
  document.querySelectorAll('input[type="date"]').forEach(inp => {
    inp.style.background = t.surface2;
    inp.style.color = t.text;
    inp.style.borderColor = t.border;
    // Invert calendar icon for dark themes

function esc(value){
  return String(value ?? "").replace(/[&<>"']/g,char=>({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
  })[char])
}
function isPlainObject(value){
  return value!==null&&typeof value==="object"&&!Array.isArray(value)
}
function isFiniteNumber(value){
  return typeof value==="number"&&Number.isFinite(value)
}
function isValidScore(score){
  if(isFiniteNumber(score))return true;
  return isPlainObject(score)&&Number.isInteger(score.r)&&score.r>=1&&isFiniteNumber(score.v)
}
function isValidPlayer(player,withScores){
  if(!isPlainObject(player)||typeof player.id!=="string"||!player.id||
    typeof player.name!=="string"||!player.name.trim()||
    typeof player.emoji!=="string")return false;
  if(player.color!==undefined&&typeof player.color!=="string")return false;
  if(player.groups!==undefined&&(!Array.isArray(player.groups)||player.groups.some(g=>typeof g!=="string")))return false;
  if(!withScores)return true;
  return Array.isArray(player.scores)&&player.scores.every(isValidScore)&&isFiniteNumber(player.total)
}
function isValidSession(session){
  return isPlainObject(session)&&typeof session.id==="string"&&session.id&&
    typeof session.gameName==="string"&&session.gameName.trim()&&
    typeof session.date==="string"&&/^\d{4}-\d{2}-\d{2}$/.test(session.date)&&
    Array.isArray(session.players)&&session.players.length>0&&session.players.every(p=>isValidPlayer(p,true))&&
    Number.isInteger(session.round)&&session.round>=1&&
    (session.startedAt===undefined||isFiniteNumber(session.startedAt))&&
    (session.finishedAt===undefined||isFiniteNumber(session.finishedAt))
}
function validateImportData(data){
  if(!isPlainObject(data)||data.version!==1)return "Version d'export non prise en charge.";
  if(!Array.isArray(data.games)||data.games.some(g=>typeof g!=="string"||!g.trim()))return "Liste de jeux invalide.";
  if(!Array.isArray(data.players)||data.players.some(p=>!isValidPlayer(p,false)))return "Liste de joueurs invalide.";
  if(!Array.isArray(data.sessions)||data.sessions.some(s=>!isValidSession(s)))return "Historique invalide.";
  return "";
}
function updatePlayerRoundScore(data,playerId,round,score){
  const current={...data.current};
  current.players=current.players.map(player=>{
    if(player.id!==playerId)return player;
    const scores=player.scores.filter(entry=>entry.r!==round);
    if(score!==undefined)scores.push({r:round,v:score});
    return{...player,scores,total:scores.reduce((total,entry)=>total+entry.v,0)};
  });
  return{...data,current};
}
function avClass(p){return"av "+(AVCOLORS.includes(p.color)?p.color:"av0")}
function rankClass(i){return"rank-item"+(i===0?" r1":i===1?" r2":i===2?" r3":"")}
function rankBadge(i){return i===0?"\ud83e\udd47":i===1?"\ud83e\udd48":i===2?"\ud83e\udd49":"#"+(i+1)}
function badgeClass(i){return"rank-badge "+(i===0?"rb1":i===1?"rb2":i===2?"rb3":"rbn")}
function col(total){return total>0?"var(--accent)":total<0?"#dc2626":"var(--text)"}
function el(tag,cls,html,attrs){
  const e=document.createElement(tag);
  if(cls)e.className=cls;
  if(html)e.innerHTML=html;
  if(attrs)Object.entries(attrs).forEach(([k,v])=>e.setAttribute(k,v));
  return e
}
function div(cls,html){return el("div",cls,html)}
function btn(cls,text,fn){const b=el("button",cls,text);b.onclick=fn;return b}
function showEmojiPicker(onSelect){
  showModal((sheet,close)=>{
    sheet.appendChild(div("mtitle","Choisir un emoji"));
    const grid=div("");
    grid.style.cssText="display:flex;flex-wrap:wrap;gap:9px";

      emojiBtn.onclick=()=>{
        onSelect(emoji);
        close();
      };
      grid.appendChild(emojiBtn);
    });
    sheet.appendChild(grid);

}
function renderGroupButtons(container,selectedGroups,onChange,padding){
  container.innerHTML="";
  GROUPS.forEach(group=>{
    const isSelected=selectedGroups.includes(group.id);
    const groupBtn=document.createElement("button");
    groupBtn.style.cssText=`display:flex;align-items:center;gap:5px;padding:${padding};border-radius:99px;
      font-size:13px;font-weight:600;cursor:pointer;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;transition:all .15s;border:1.5px solid;
      background:${isSelected?"var(--accent)":"var(--surface)"};
      color:${isSelected?"#fff":"var(--text)"};
      border-color:${isSelected?"var(--accent)":"var(--border)"}`;
    groupBtn.textContent=group.icon+" "+group.label;
    groupBtn.onclick=()=>onChange(
      isSelected
        ? selectedGroups.filter(id=>id!==group.id)
        : [...selectedGroups,group.id]
    );
    container.appendChild(groupBtn);
  });
}
function confetti(){
  const cols=["#e8400c","#4c5fd5","#f5c842","#1db87a","#e8a00c","#c026d3"];
  for(let i=0;i<40;i++){
    const d=document.createElement("div");
    d.className="cf";
    d.style.cssText="left:"+(Math.random()*100)+"%;top:-20px;width:"+(6+Math.random()*10)+"px;height:"+(6+Math.random()*10)+"px;background:"+cols[Math.floor(Math.random()*cols.length)]+";animation-delay:"+(Math.random()*1.5)+"s;border-radius:"+(Math.random()>.5?"50%":"2px");
    document.body.appendChild(d);
    setTimeout(()=>d.remove(),3500);
  }
}

// ── MODAL ──────────────────────────────────────────────────
function showModal(buildFn){
  const root=document.getElementById("modal-root");
  const overlay=div("overlay");
  const sheet=div("sheet");
  const handle=div("handle");
  sheet.appendChild(handle);
  buildFn(sheet,()=>{overlay.remove()});
  overlay.appendChild(sheet);
  overlay.onclick=(e)=>{if(e.target===overlay)overlay.remove()};
  root.appendChild(overlay);
}

let currentTab="home";
function buildNav(){
  const nav=document.getElementById("nav");
  nav.innerHTML="";
  TABS.forEach(t=>{
    const b=document.createElement("button");
    b.className="nb"+(currentTab===t.id?" on":"");
    const lbl=t.id==="game"&&D.current?"● Partie":t.lbl;
    b.innerHTML=`<svg viewBox="0 0 24 24"><path d="${t.ico}" stroke-linecap="round" stroke-linejoin="round"/></svg><span>${lbl}</span><div class="nb-dot"></div>`;
    b.onclick=()=>goTab(t.id);
    nav.appendChild(b);
  });
}
function goTab(id){
  currentTab=id;
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById("p-"+id).classList.add("active");
  buildNav();
  renderPage(id);
}

// ── RENDER ──────────────────────────────────────────────────
function render(){buildNav();renderPage(currentTab)}
function renderPage(id){
  const pg=document.getElementById("p-"+id);
  pg.innerHTML="";
  if(id==="home") buildHome(pg);
  else if(id==="game") buildGame(pg);
  else if(id==="history") buildHistory(pg);
  else if(id==="stats") buildStats(pg);
  else if(id==="settings") buildSettings(pg);
}

// ── HOME ──────────────────────────────────────────────────

  let selGame="", selDate=today(), selPlayers=[];
  const wrap=div("inner");
  pg.appendChild(wrap);

  const logo=el("img","hdr-logo","",{src:LOGO,alt:""});

  wrap.appendChild(hdr);

  // Active session banner

    const ban=div("active-banner");
    ban.innerHTML=`<div><div style="font-weight:700;font-size:14px">Partie en cours</div><div style="font-size:12px;color:var(--muted);margin-top:2px">${esc(D.current.gameName)} · ${esc(fmtDate(D.current.date))}</div></div>`;
    const rb=btn("btn btn-s btn-sm","Reprendre →",()=>goTab("game"));
    ban.appendChild(rb);
    wrap.appendChild(ban);
  }

  // Game card
  const gc=div("card fu");
  const gfg=div("fg");
  const glbl=el("label","lbl","Jeu");
  const gpick=div("",`<div style="display:flex;gap:8px">
    <div id="game-sel" style="flex:1;background:var(--surface);border:none;border-radius:var(--rs);box-shadow:var(--shadow);padding:13px 15px;font-size:15px;cursor:pointer;color:var(--dim)">Choisir un jeu…</div>
  </div>`);
  gfg.appendChild(glbl);gfg.appendChild(gpick);
  gc.appendChild(gfg);

  const dfg=div("fg");
  dfg.innerHTML=`<label class="lbl">Date</label><input type="date" class="inp" id="date-inp" value="${selDate}" style="color-scheme:light"/>`;
  // Apply current theme to date input
  setTimeout(()=>{
    const di=document.getElementById("date-inp");
    if(di){
      const t=THEMES.find(x=>x.id===currentTheme)||THEMES[0];
      const isDark=t.id==="night"||t.id==="minuit"||t.id==="myrtille";
      di.style.colorScheme=isDark?"dark":"light";
      di.style.background=t.surface2;
      di.style.color=t.text;
    }
  },0);
  gc.appendChild(dfg);
  wrap.appendChild(gc);

  // Players card
  const pc=div("card fu");
  const ph=div("",`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px"><div class="ctitle" style="margin:0">Joueurs</div></div>`);
  const padd=btn("btn btn-s btn-sm","+ Ajouter",()=>{
    showModal((sheet,close)=>{
      sheet.appendChild(div("mtitle","Sélectionner les joueurs"));

      // Group filter bar
      let activeGroup = "tous";
      const filterBar = div("");
      filterBar.style.cssText = "display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap";

      function buildFilterBar(){
        filterBar.innerHTML = "";
        const allGroups = [{id:"tous",label:"Tous",icon:"👥"}, ...GROUPS];
        allGroups.forEach(g => {
          const isActive = activeGroup === g.id;
          const fb = document.createElement("button");
          fb.style.cssText = `display:flex;align-items:center;gap:5px;padding:7px 12px;border-radius:99px;
            font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;transition:all .15s;
            background:${isActive?"var(--accent)":"var(--surface)"};
            color:${isActive?"#fff":"var(--text)"};
            border-color:${isActive?"var(--accent)":"var(--border)"};`;
          fb.textContent = g.icon + " " + g.label;
          fb.onclick = () => { activeGroup = g.id; buildFilterBar(); refreshList(); };
          filterBar.appendChild(fb);
        });
      }
      buildFilterBar();
      sheet.appendChild(filterBar);

      const list = div("");
      function refreshList(){
        list.innerHTML = "";
        const filtered = activeGroup === "tous"
          ? D.players
          : D.players.filter(p => (p.groups||[]).includes(activeGroup));

        if(!filtered.length){
          list.innerHTML = `<div style="text-align:center;padding:20px;color:var(--muted);font-size:14px">Aucun joueur dans ce groupe</div>`;
          return;
        }

        // Group header + select all button
        if(activeGroup !== "tous"){
          const g = GROUPS.find(x=>x.id===activeGroup);
          const gh = div("");
          gh.style.cssText = "display:flex;align-items:center;justify-content:space-between;margin-bottom:8px";
          const allInGroup = filtered.every(p => selPlayers.find(x=>x.id===p.id));
          const selAllBtn = document.createElement("button");
          selAllBtn.style.cssText = "font-size:12px;font-weight:600;color:var(--accent);background:none;border:none;cursor:pointer;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;padding:4px 8px";
          selAllBtn.textContent = allInGroup ? "Tout désélectionner" : "Tout sélectionner";
          selAllBtn.onclick = () => {
            if(allInGroup) selPlayers = selPlayers.filter(p => !filtered.find(f=>f.id===p.id));
            else {
              filtered.forEach(p => { if(!selPlayers.find(x=>x.id===p.id)) selPlayers.push(p); });
            }
            refreshList(); refreshPlayers(); updateBtn();
          };
          gh.appendChild(selAllBtn);
          list.appendChild(gh);
        }

        filtered.forEach(p => {
          const isSel = selPlayers.find(x=>x.id===p.id);
          const groupTags = (p.groups||[]).map(gid => {
            const g = GROUPS.find(x=>x.id===gid);
            return g ? `<span style="font-size:10px;background:var(--accent-lt);color:var(--accent);border-radius:99px;padding:2px 8px;font-weight:600;margin-left:4px">${g.icon}</span>` : "";
          }).join("");

          const row = div("");
          row.style.cssText = `display:flex;align-items:center;gap:11px;padding:11px 13px;
            background:${isSel?"var(--accent-lt)":"var(--surface)"};
            border:none;
            box-shadow:var(--shadow);
            border-radius:12px;cursor:pointer;margin-bottom:7px;transition:all .15s`;
          row.innerHTML = `
            <div class="${avClass(p)}">${esc(p.emoji)}</div>
            <div style="flex:1">
              <div style="font-weight:600;font-size:15px">${esc(p.name)}${groupTags}</div>
            </div>
            <div style="width:23px;height:23px;border-radius:7px;border:2px solid ${isSel?"var(--accent)":"rgba(46,125,120,0.2)"};
              background:${isSel?"var(--accent)":"transparent"};display:flex;align-items:center;justify-content:center;
              color:#fff;font-size:13px;font-weight:700">${isSel?"✓":""}</div>`;
          row.onclick = () => {
            if(isSel) selPlayers = selPlayers.filter(x=>x.id!==p.id);
            else selPlayers = [...selPlayers, p];
            refreshList(); refreshPlayers(); updateBtn();
          };
          list.appendChild(row);
        });
      }
      refreshList();
      sheet.appendChild(list);
      sheet.appendChild(btn("btn btn-p btn-full","Confirmer",close));
    });
  });
  ph.firstChild.appendChild(padd);
  pc.appendChild(ph);
  const plist=div("",`<div id="player-list" style="display:flex;flex-direction:column;gap:7px"><div style="padding:16px 0;text-align:center;color:var(--muted);font-size:14px">Aucun joueur sélectionné</div></div>`);
  pc.appendChild(plist);
  wrap.appendChild(pc);

  // Start btn
  const sb=btn("btn btn-p btn-full fu","🚀 Démarrer la partie",()=>{
    const gn=selGame||document.getElementById("game-sel").dataset.val||"";
    const dt=document.getElementById("date-inp").value;
    if(!gn||!selPlayers.length)return;
    const session={id:uid(),gameName:gn,date:dt,startedAt:Date.now(),players:selPlayers.map(p=>({...p,scores:[],total:0})),round:1};
    upd(d=>({...d,current:session}));
    goTab("game");
  });
  sb.style.marginTop="8px";
  if(D.current){
    sb.disabled=true;
    sb.style.opacity="0.4";
    sb.textContent="⚠️ Terminez la partie en cours d'abord";
  } else {
    sb.disabled=true; // will be enabled by updateBtn
  }
  wrap.appendChild(sb);

  // Game picker
  document.getElementById("game-sel").onclick=()=>{
    showModal((sheet,close)=>{
      sheet.appendChild(div("mtitle","Choisir un jeu"));
      const si=el("input","inp","",{type:"text",placeholder:"Rechercher…"});
      si.style.marginBottom="14px";
      sheet.appendChild(si);
      const gl=div("");
      function refreshGames(filter){
        gl.innerHTML="";
        const filtered=D.games.filter(g=>g.toLowerCase().includes(filter.toLowerCase()));
        filtered.forEach(g=>{
          const b=btn("btn btn-s","","",);
          b.style.justifyContent="flex-start";
          b.style.marginBottom="6px";
          b.style.width="100%";
          b.textContent=(selGame===g?"✓ ":"")+g;
          if(selGame===g)b.style.borderColor="var(--accent)";
          b.onclick=()=>{
            selGame=g;
            const gsel=document.getElementById("game-sel");
            if(gsel){gsel.textContent=g;gsel.style.color="var(--text)";gsel.dataset.val=g;}
            updateBtn();close();
          };
          gl.appendChild(b);
        });
        if(filter&&!D.games.includes(filter)){
          const b=btn("btn btn-s","+ Utiliser \""+filter+"\"",()=>{
            selGame=filter;
            const gsel=document.getElementById("game-sel");
            if(gsel){gsel.textContent=filter;gsel.style.color="var(--text)";gsel.dataset.val=filter;}
            updateBtn();close();
          });
          b.style.justifyContent="flex-start";b.style.width="100%";b.style.borderStyle="dashed";
          gl.appendChild(b);
        }
      }
      si.oninput=()=>refreshGames(si.value);
      refreshGames("");
      sheet.appendChild(gl);
    });
  };

  function refreshPlayers(){
    const pl=document.getElementById("player-list");
    if(!pl)return;
    if(!selPlayers.length){
      pl.innerHTML=`<div style="padding:16px 0;text-align:center;color:var(--muted);font-size:14px">Aucun joueur sélectionné</div>`;
      return;
    }
    pl.innerHTML="";

    function buildRows(){
      pl.innerHTML="";
      selPlayers.forEach((p,idx)=>{
        const row=document.createElement("div");
        row.className="drag-row";
        row.dataset.idx=idx;
        row.style.cssText="display:flex;align-items:center;gap:10px;padding:11px 13px;background:var(--surface);border-radius:11px;margin-bottom:7px;border:1.5px solid transparent;transition:border-color .15s,box-shadow .15s;touch-action:none;user-select:none;-webkit-user-select:none;position:relative";

        const num=document.createElement("div");
        num.style.cssText="width:22px;height:22px;border-radius:7px;background:var(--accent);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0";
        num.textContent=idx+1;

        const handle=document.createElement("div");
        handle.style.cssText="font-size:18px;color:var(--dim);flex-shrink:0;padding:0 2px;line-height:1";
        handle.innerHTML="&#8942;&#8942;";

        const av=document.createElement("div");
        av.className=avClass(p);av.textContent=p.emoji;

        const name=document.createElement("span");
        name.style.cssText="flex:1;font-weight:600;font-size:15px";
        name.textContent=p.name;

        const rb=document.createElement("button");
        rb.style.cssText="background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer;padding:4px 8px;border-radius:6px;flex-shrink:0";
        rb.textContent="✕";
        rb.onclick=e=>{e.stopPropagation();selPlayers=selPlayers.filter(x=>x.id!==p.id);buildRows();updateBtn();};

        row.appendChild(num);row.appendChild(handle);row.appendChild(av);row.appendChild(name);row.appendChild(rb);
        pl.appendChild(row);

        // ── TOUCH DRAG (iOS) ──────────────────────────────
        let ghost=null, startY=0, startIdx=0, currentTarget=-1;

        handle.addEventListener("touchstart",e=>{
          e.preventDefault();
          startY=e.touches[0].clientY;
          startIdx=idx;
          currentTarget=idx;

          // Create ghost clone
          const rect=row.getBoundingClientRect();
          ghost=row.cloneNode(true);
          ghost.style.cssText=`position:fixed;left:${rect.left}px;top:${rect.top}px;width:${rect.width}px;z-index:999;opacity:0.85;border-radius:11px;background:var(--surface);box-shadow:0 8px 24px rgba(0,0,0,0.25);pointer-events:none;transition:none;display:flex;align-items:center;gap:10px;padding:11px 13px;border:2px solid var(--accent)`;
          document.body.appendChild(ghost);
          row.style.opacity="0.3";
        },{passive:false});

        handle.addEventListener("touchmove",e=>{
          if(!ghost)return;
          e.preventDefault();
          const dy=e.touches[0].clientY - startY;
          ghost.style.transform=`translateY(${dy}px)`;

          // Find which row we're hovering
          const y=e.touches[0].clientY;
          const rows=[...pl.querySelectorAll(".drag-row")];
          rows.forEach((r,i)=>{
            r.style.borderColor="transparent";
            r.style.boxShadow="none";
          });
          let hoverIdx=startIdx;
          rows.forEach((r,i)=>{
            const rc=r.getBoundingClientRect();
            if(y>=rc.top && y<=rc.bottom){
              hoverIdx=i;
              if(i!==startIdx){
                r.style.borderColor="var(--accent)";
                r.style.boxShadow="0 0 0 2px var(--accent)";
              }
            }
          });
          currentTarget=hoverIdx;
        },{passive:false});

        handle.addEventListener("touchend",e=>{
          if(ghost){ghost.remove();ghost=null;}
          row.style.opacity="1";
          const rows=[...pl.querySelectorAll(".drag-row")];
          rows.forEach(r=>{r.style.borderColor="transparent";r.style.boxShadow="none";});

          if(currentTarget!==-1 && currentTarget!==startIdx){
            const moved=selPlayers.splice(startIdx,1)[0];
            selPlayers.splice(currentTarget,0,moved);
            updateBtn();
          }
          buildRows();
        },{passive:true});

        // ── MOUSE DRAG (desktop) ──────────────────────────
        let dragSrc=null;
        row.draggable=true;
        row.addEventListener("dragstart",e=>{dragSrc=idx;e.dataTransfer.effectAllowed="move";setTimeout(()=>row.style.opacity="0.3",0);});
        row.addEventListener("dragend",()=>{row.style.opacity="1";pl.querySelectorAll(".drag-row").forEach(r=>{r.style.borderColor="transparent";});});
        row.addEventListener("dragover",e=>{e.preventDefault();if(dragSrc!==idx)row.style.borderColor="var(--accent)";});
        row.addEventListener("dragleave",()=>row.style.borderColor="transparent");
        row.addEventListener("drop",e=>{
          e.preventDefault();row.style.borderColor="transparent";
          if(dragSrc===null||dragSrc===idx)return;
          const moved=selPlayers.splice(dragSrc,1)[0];
          selPlayers.splice(idx,0,moved);
          dragSrc=null;buildRows();updateBtn();
        });
      });

      if(selPlayers.length>1){
        const hint=document.createElement("div");
        hint.style.cssText="text-align:center;font-size:11px;color:var(--muted);margin-top:2px;letter-spacing:.02em";
        hint.textContent="Maintenir ⠿ et glisser pour réordonner";
        pl.appendChild(hint);
      }
    }
    buildRows();
  }

  function updateBtn(){
    if(D.current)return; // already blocked above
    const gn=selGame||"";
    sb.disabled=!gn||!selPlayers.length;
  }
}

function buildGame(pg){

    b.style.marginTop="14px";
    em.appendChild(b);
    wrap.appendChild(em);
    pg.appendChild(wrap);
    return;
  }
  const s=D.current;
  const sorted=[...s.players].sort((a,b)=>b.total-a.total);
  const wrap=div("inner");
  pg.appendChild(wrap);

  const hdr=div("hdr");
  const hl=div("");
  hl.innerHTML=`<h1>${esc(s.gameName)}</h1><div class="sub">${esc(fmtDate(s.date))} · ${s.players.length} joueurs</div>`;
  const rp=div("rpill","\ud83c\udfaf Manche "+s.round);
  hdr.appendChild(hl);hdr.appendChild(rp);
  wrap.appendChild(hdr);

  const tb=div("tabbar");
  ["scores","rank","detail"].forEach(t=>{
    const b=el("button","tab"+(gameTab===t?" on":""),t==="scores"?"Scores":t==="rank"?"Classement":"Détail");
    b.onclick=()=>{gameTab=t;buildGame(pg)};
    tb.appendChild(b);
  });
  wrap.appendChild(tb);

  if(gameTab==="scores"){
    const currentRound = s.round;

    // Which players already scored this round
    const scoredThisRound = s.players.filter(p =>
      p.scores.find(sc => sc.r === currentRound)
    );
    const allScored = scoredThisRound.length === s.players.length;
    const noneScored = scoredThisRound.length === 0;

    // Status bar

      <span style="margin-left:auto;font-size:12px;color:var(--muted)">${allScored ? "✅ Tous ont saisi" : progress + " ont saisi"}</span>`;
    wrap.appendChild(sb);

    // Player rows
    s.players.forEach(p=>{
      const hasScored = !!p.scores.find(sc => sc.r === currentRound);
      const row=div("score-row");
      row.style.opacity = hasScored ? "0.65" : "1";
      row.style.borderColor = hasScored ? "var(--accent)" : "transparent";

      const avEl = document.createElement("div");
      avEl.className = avClass(p); avEl.textContent = p.emoji;

      const nameEl = document.createElement("div");
      nameEl.style.cssText = "flex:1;display:flex;flex-direction:column;gap:2px";
      const nameTop = document.createElement("div");
      nameTop.style.cssText = "font-weight:600;font-size:15px";
      nameTop.textContent = p.name;
      const nameSub = document.createElement("div");
      nameSub.style.cssText = "font-size:11px;color:var(--muted)";
      nameSub.textContent = "Total: " + p.total + " pts · " + (hasScored ? "✓ saisi" : "en attente");
      nameEl.appendChild(nameTop); nameEl.appendChild(nameSub);

      const roundEntry = p.scores ? p.scores.find(sc => sc.r === currentRound) : null;
      const roundVal = roundEntry ? roundEntry.v : undefined;
      const totalEl = document.createElement("div");
      totalEl.className = "sr-total";
      if(roundVal !== undefined){
        totalEl.style.color = col(roundVal);
        totalEl.textContent = (roundVal > 0 ? "+" : "") + roundVal;
      } else {
        totalEl.style.color = "var(--dim)";
        totalEl.textContent = "—";
      }

      const arrEl = document.createElement("div");
      arrEl.className = "sr-arr";
      arrEl.textContent = hasScored ? "✏️" : "›";

      row.appendChild(avEl); row.appendChild(nameEl);
      row.appendChild(totalEl); row.appendChild(arrEl);

    // Navigation buttons row — 3 buttons on one line
    const brow=div("");

    // ← Previous round
    const pb = document.createElement("button");
    pb.style.cssText=`flex:1;display:flex;align-items:center;justify-content:center;gap:4px;
      border-radius:var(--rs);font-weight:700;font-size:13px;padding:13px 8px;
      border:1.5px solid var(--border);cursor:pointer;

      color:${currentRound>1?"var(--text)":"var(--dim)"};
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;pointer-events:${currentRound>1?"auto":"none"}`;
    pb.innerHTML="← M"+(currentRound-1 > 0 ? currentRound-1 : "");
    pb.onclick=()=>upd(d=>({...d,current:{...d.current,round:d.current.round-1}}));

    // Current round — non clickable
    const cb2 = document.createElement("button");
    cb2.style.cssText=`flex:1.2;display:flex;align-items:center;justify-content:center;
      border-radius:var(--rs);font-weight:800;font-size:15px;padding:13px 8px;
      border:2px solid var(--accent);cursor:default;pointer-events:none;
      background:${allScored?"var(--accent)":"var(--surface)"};
      color:${allScored?"#fff":"var(--accent)"};
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif`;
    cb2.textContent="Manche "+currentRound;

    // → Next round
    const nb = document.createElement("button");
    nb.style.cssText=`flex:1;display:flex;align-items:center;justify-content:center;gap:4px;
      border-radius:var(--rs);font-weight:700;font-size:13px;padding:13px 8px;
      border:1.5px solid var(--border);cursor:pointer;
      background:var(--surface);color:var(--text);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif`;
    nb.innerHTML="M"+(currentRound+1)+" →";
    nb.onclick=()=>upd(d=>({...d,current:{...d.current,round:d.current.round+1}}));

    brow.appendChild(pb); brow.appendChild(cb2); brow.appendChild(nb);
    wrap.appendChild(brow);

    // 🏁 End game — below
    const erow=div("");
    erow.style.cssText="margin-top:10px";
    wrap.appendChild(makeEndGameBtn(s));

    // Info if nobody scored yet this round
    if(noneScored && currentRound > 1){
      const info = div("");
      info.style.cssText = "margin-top:10px;text-align:center;font-size:12px;color:var(--muted);line-height:1.5";
      info.textContent = "Si personne ne marque, passez directement à la manche suivante →";

  }

    sorted.forEach((p,i)=>{
      const row=div(rankClass(i));

        <div class="${avClass(p)}">${esc(p.emoji)}</div>

      wrap.appendChild(row);
    });
    if(sorted.length>1){
      const cd=div("card");
      cd.style.marginTop="14px";
      cd.innerHTML=`<div class="ctitle">Écart</div><div style="font-size:13px;color:var(--muted)">${esc(sorted[0].name)} mène avec <strong style="color:var(--accent)">${sorted[0].total-sorted[1].total} pts</strong> d'avance sur ${esc(sorted[1].name)}</div>`;
      wrap.appendChild(cd);
    }
    wrap.appendChild(makeEndGameBtn(s));
  }

  if(gameTab==="detail"){
    const card=div("card");
    card.innerHTML=`<div class="ctitle">Détail par manche <span style="font-size:10px;color:var(--accent);font-weight:600;text-transform:none;letter-spacing:0">— toucher pour modifier</span></div>`;
    const maxR=s.round;
    const tbl=el("table","dtable");
    let thHtml=`<tr><th>Joueur</th>`;
    for(let i=1;i<=maxR;i++)thHtml+=`<th style="text-align:center">M${i}</th>`;
    thHtml+=`<th style="text-align:right;color:var(--accent)">Total</th></tr>`;
    tbl.innerHTML=thHtml;
    s.players.forEach(p=>{
      const tr=document.createElement("tr");
      const tdName=document.createElement("td");
      tdName.textContent=p.emoji+" "+p.name;
      tr.appendChild(tdName);
      for(let i=1;i<=maxR;i++){
        const td=document.createElement("td");
        td.style.textAlign="center";
        const entry=p.scores.find(sc=>sc.r===i);
        const v=entry?entry.v:undefined;
        const span=document.createElement("span");
        if(v!==undefined){

          span.style.cssText="display:inline-block;padding:5px 9px;border-radius:10px;background:rgba(46,125,120,0.15);border:1px solid rgba(46,125,120,0.3);cursor:pointer;font-family:SFMono-Regular,Consolas,Liberation Mono,monospace;color:"+(v<0?"#c03030":"var(--text)");

    wrap.appendChild(makeEndGameBtn(s));
  }

// ── NUMPAD ──────────────────────────────────────────────────
function createScoreInput(sheet,existingVal,hint){
  let val=existingVal!==undefined?String(Math.abs(existingVal)):"";
  let neg=existingVal!==undefined&&existingVal<0;

  const disp=div("ndisp");
  sheet.appendChild(disp);
  sheet.appendChild(div("",`<div style="text-align:center;font-size:12px;color:var(--muted);margin:5px 0 2px">${hint}</div>`));

  function refresh(){
    disp.textContent=val===""?"0":(neg?"-":"+")+val;
    disp.style.color=neg?"#c03030":"var(--accent)";
  }
  refresh();

  const grid=div("numpad-grid");
  ["1","2","3","4","5","6","7","8","9","±","0","⌫"].forEach(key=>{
    const keyBtn=el("button","nk",key);
    keyBtn.onclick=()=>{
      if(key==="⌫")val=val.slice(0,-1);
      else if(key==="±")neg=!neg;
      else if(val.length<5)val+=key;
      refresh();
    };
    grid.appendChild(keyBtn);
  });
  sheet.appendChild(grid);

  return()=>neg?-parseInt(val||"0"):parseInt(val||"0");
}

function showNumpad(player){
  const currentRound = D.current ? D.current.round : 1;
  const existingEntry = player.scores ? player.scores.find(sc=>sc.r===currentRound) : null;
  const existingVal = existingEntry ? existingEntry.v : undefined;
  const isEdit = existingVal!==undefined;

  showModal((sheet,close)=>{
    const head=div("");
    head.style.cssText="display:flex;align-items:center;gap:11px;margin-bottom:18px";
    head.innerHTML=`<div class="${avClass(player)}">${esc(player.emoji)}</div>
      <div style="flex:1">
        <div style="font-size:17px;font-weight:700">${esc(player.name)}</div>
        <div style="font-size:12px;color:var(--muted);margin-top:2px">${isEdit?"✏️ Modifier — ":""}Manche ${currentRound} · Total: ${player.total}</div>
      </div>`;
    sheet.appendChild(head);

    const getScore=createScoreInput(sheet,existingVal,`points — manche ${currentRound}`);

    if(isEdit){
      const delBtn=btn("btn btn-d btn-full","🗑 Supprimer ce score",()=>{
        upd(d=>updatePlayerRoundScore(d,player.id,currentRound));
        close();
      });
      delBtn.style.marginTop="12px";
      sheet.appendChild(delBtn);
    }

    const cb=btn("btn btn-p btn-full",isEdit?"✓ Modifier le score":"✓ Valider",()=>{
      const score=getScore();
      upd(d=>updatePlayerRoundScore(d,player.id,currentRound,score));
      close();
    });
    cb.style.marginTop=isEdit?"8px":"14px";
    sheet.appendChild(cb);
  });
}

// ── HISTORY ──────────────────────────────────────────────────
let histDetail=null;
function buildHistory(pg){
  pg.innerHTML="";
  const wrap=div("inner");
  pg.appendChild(wrap);
  if(histDetail){buildHistDetail(wrap,histDetail,()=>{histDetail=null;buildHistory(pg)});return;}
  const sessions=[...D.sessions].reverse();
  const hdr=div("hdr");
  hdr.innerHTML=`<div><h1>Historique</h1><div class="sub">${D.sessions.length} partie${D.sessions.length>1?"s":""}</div></div>`;
  wrap.appendChild(hdr);

  const si=el("input","inp","",{type:"search",placeholder:"\ud83d\udd0d Rechercher un jeu…"});
  si.style.marginBottom="14px";
  wrap.appendChild(si);

  const listWrap=div("");
  wrap.appendChild(listWrap);

  function renderList(filter){
    listWrap.innerHTML="";
    const filtered=sessions.filter(s=>s.gameName.toLowerCase().includes(filter.toLowerCase()));
    if(!filtered.length){
      const em=div("empty");
      em.innerHTML=`<div class="empty-ico">\ud83d\udcdc</div><div style="font-weight:700;font-size:18px">Aucune partie</div><div style="font-size:14px;color:var(--muted)">Les parties terminées apparaîtront ici.</div>`;
      listWrap.appendChild(em);return;
    }
    const grouped={};
    filtered.forEach(s=>{if(!grouped[s.gameName])grouped[s.gameName]=[];grouped[s.gameName].push(s);});
    Object.entries(grouped).forEach(([game,sess])=>{
      const gh=div("",`<div style="display:flex;align-items:center;gap:9px;margin-bottom:9px"><div class="slbl" style="margin:0">${esc(game)}</div><div class="badge bb">${sess.length} partie${sess.length>1?"s":""}</div></div>`);
      listWrap.appendChild(gh);
      sess.forEach(s=>{
        const winner=[...s.players].sort((a,b)=>b.total-a.total)[0];
        const card=div("hist");
        card.innerHTML=`<div style="display:flex;align-items:center;justify-content:space-between">
          <div class="hist-name">${esc(s.gameName)}</div>
          <div style="font-size:12px;color:var(--muted)">${esc(fmtDate(s.date))}</div>
        </div>
        <div class="hist-meta">${s.players.length} joueurs · ${Math.max(...s.players.map(p=>p.scores.length),0)} manches</div>
        ${winner?`<div class="hist-winner">
          <span style="font-size:13px;color:var(--muted)">Gagnant :</span>
          <div class="${avClass(winner)}">${esc(winner.emoji)}</div>
          <span style="font-weight:700;font-size:14px">${esc(winner.name)}</span>
          <span style="margin-left:auto;font-family:SFMono-Regular,Consolas,Liberation Mono,monospace;color:var(--accent);font-weight:700">${winner.total} pts</span>
        </div>`:""}`;
        card.onclick=()=>{histDetail=s;pg.innerHTML="";buildHistory(pg)};
        listWrap.appendChild(card);
      });
    });
  }
  si.oninput=()=>renderList(si.value);
  renderList("");
}

function buildHistDetail(wrap,s,back){
  wrap.innerHTML="";
  const sorted=[...s.players].sort((a,b)=>b.total-a.total);

  // Header
  const hdr=div("hdr");
  const bb=btn("btn btn-g","← Retour",()=>{wrap.innerHTML="";back();});
  bb.style.padding="8px 0";
  const acts=div("");
  acts.style.cssText="display:flex;gap:7px";

  // Share image button
  const shareBtn=btn("btn btn-s btn-sm","📤 Partager",()=>shareAsImage(s,sorted));

  const del=btn("btn btn-d btn-sm","🗑",()=>{
    if(confirm("Supprimer cette partie ?")){
      upd(d=>({...d,sessions:d.sessions.filter(x=>x.id!==s.id)}));
      wrap.innerHTML="";
      back();
    }
  });
  acts.appendChild(shareBtn);acts.appendChild(del);
  hdr.appendChild(bb);hdr.appendChild(acts);
  wrap.appendChild(hdr);

  // Title
  const title=div("");
  title.style.cssText="margin-bottom:18px";
  title.innerHTML=`<div style="font-size:24px;font-weight:800;letter-spacing:-.02em">${esc(s.gameName)}</div><div style="font-size:13px;color:var(--muted);margin-top:3px">${esc(fmtDate(s.date))} · ${s.players.length} joueurs</div>`;
  wrap.appendChild(title);

  // Ranking
  wrap.appendChild(div("slbl","Classement final"));
  sorted.forEach((p,i)=>{
    const row=div(rankClass(i));
    row.innerHTML=`<div class="${badgeClass(i)}">${rankBadge(i)}</div><div class="${avClass(p)}">${esc(p.emoji)}</div><div class="rank-name">${esc(p.name)}</div><div class="rank-score" style="color:${col(p.total)}">${p.total}</div>`;
    wrap.appendChild(row);
  });

  // Detail table
  wrap.appendChild(div("slbl","Détail des manches"));
  const card=div("card");
  const maxR=s.round||Math.max(...s.players.map(p=>p.scores.length),1);
  let thHtml=`<tr><th>Joueur</th>`;
  for(let i=1;i<=maxR;i++)thHtml+=`<th style="text-align:center">M${i}</th>`;
  thHtml+=`<th style="text-align:right;color:var(--accent)">Total</th></tr>`;
  let tbody="";
  s.players.forEach(p=>{
    let row=`<tr><td>${esc(p.emoji)} ${esc(p.name)}</td>`;
    for(let i=1;i<=maxR;i++){
      const isObj=Array.isArray(p.scores)&&p.scores.length>0&&typeof p.scores[0]==="object";
      const entry=isObj?p.scores.find(sc=>sc.r===i):null;
      const v=entry?entry.v:(isObj?undefined:p.scores[i-1]);
      row+=v!==undefined?`<td style="text-align:center;color:${v<0?"#c03030":"var(--text)"}">${v>0?"+":""}${v}</td>`:`<td style="text-align:center;color:var(--dim)">—</td>`;
    }
    const total=Array.isArray(p.scores)?p.scores.reduce((a,b)=>a+(typeof b==="object"?b.v:b),0):0;
    row+=`<td style="text-align:right;color:${col(total)};font-weight:700;font-family:SFMono-Regular,Consolas,Liberation Mono,monospace">${total}</td></tr>`;
    tbody+=row;
  });
  const tbl=el("table","dtable");tbl.innerHTML=thHtml+tbody;
  const ow=div("");ow.style.overflowX="auto";
  ow.appendChild(tbl);card.appendChild(ow);
  wrap.appendChild(card);
}

// ── SHARE AS IMAGE ──────────────────────────────────────────
function shareAsImage(s,sorted){
  const W=640, PAD=36;
  const canvas=document.createElement("canvas");
  const dpr=window.devicePixelRatio||2;
  const cs=getComputedStyle(document.documentElement);
  const bgCol=cs.getPropertyValue("--bg").trim()||"#5ba8a0";
  const accentCol=cs.getPropertyValue("--accent").trim()||"#2e7d78";

  // Compute rounds
  const isObj=s.players.length>0&&s.players[0].scores.length>0&&typeof s.players[0].scores[0]==="object";
  const maxR=s.round||Math.max(...s.players.map(p=>p.scores.length),1);

  // Heights
  const HEADER=130, RANK_ROW=64, SEC_GAP=50, TH=36, DET_ROW=44, FOOTER=50;
  const H=HEADER + sorted.length*RANK_ROW + SEC_GAP + TH + s.players.length*DET_ROW + FOOTER + PAD;

  canvas.width=W*dpr; canvas.height=H*dpr;
  canvas.style.width=W+"px"; canvas.style.height=H+"px";
  const ctx=canvas.getContext("2d");
  ctx.scale(dpr,dpr);

  // Background
  const grad=ctx.createLinearGradient(0,0,W,H);
  grad.addColorStop(0,bgCol); grad.addColorStop(1,accentCol);
  ctx.fillStyle=grad; ctx.fillRect(0,0,W,H);

  // Decorative circles
  ctx.globalAlpha=0.10; ctx.fillStyle="#fff";
  ctx.beginPath();ctx.arc(W-50,50,110,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(30,H-30,70,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=1;

  // ── HEADER ──
  ctx.fillStyle="#fff";
  ctx.font="bold 30px sans-serif"; ctx.textAlign="left";
  ctx.fillText("🏆 "+s.gameName, PAD, PAD+36);
  ctx.font="15px sans-serif"; ctx.globalAlpha=0.75;
  ctx.fillText(fmtDate(s.date)+" · "+s.players.length+" joueurs · "+maxR+" manche"+(maxR>1?"s":""), PAD, PAD+62);
  ctx.globalAlpha=1;
  ctx.fillStyle="rgba(255,255,255,0.3)";
  ctx.fillRect(PAD, HEADER-14, W-PAD*2, 1.5);

  // ── CLASSEMENT ──
  ctx.fillStyle="rgba(255,255,255,0.6)"; ctx.font="bold 11px sans-serif";
  ctx.textAlign="left"; ctx.letterSpacing="2px";
  ctx.fillText("CLASSEMENT", PAD, HEADER+2);
  ctx.letterSpacing="0px";

  const medals=["🥇","🥈","🥉"];
  sorted.forEach((p,i)=>{
    const y=HEADER+14+i*RANK_ROW;
    const isFirst=i===0;
    ctx.globalAlpha=isFirst?0.20:0.08;
    ctx.fillStyle="#fff";
    roundRect(ctx,PAD-6,y,W-PAD*2+12,RANK_ROW-8,14); ctx.fill();
    ctx.globalAlpha=1;
    ctx.font=(isFirst?"26px":"20px")+" sans-serif"; ctx.textAlign="left";
    ctx.fillText(medals[i]||(i+1+"°"), PAD+2, y+RANK_ROW/2+9);
    ctx.font="24px sans-serif";
    ctx.fillText(p.emoji, PAD+46, y+RANK_ROW/2+9);
    ctx.fillStyle="#fff";
    ctx.font=(isFirst?"bold 20px":"16px")+" sans-serif"; ctx.textAlign="left";
    ctx.fillText(p.name, PAD+88, y+RANK_ROW/2+7);
    ctx.font="bold "+(isFirst?"26px":"20px")+" monospace"; ctx.textAlign="right";
    ctx.fillStyle=isFirst?"#FFD700":"rgba(255,255,255,0.9)";
    ctx.fillText(p.total+" pts", W-PAD, y+RANK_ROW/2+8);
    ctx.fillStyle="#fff";
  });

  // ── DETAIL MANCHES ──
  const detY=HEADER+sorted.length*RANK_ROW+SEC_GAP;
  ctx.fillStyle="rgba(255,255,255,0.3)";
  ctx.fillRect(PAD, detY-24, W-PAD*2, 1.5);
  ctx.fillStyle="rgba(255,255,255,0.6)"; ctx.font="bold 11px sans-serif";
  ctx.textAlign="left";
  ctx.fillText("DÉTAIL DES MANCHES", PAD, detY-6);

  // Column widths
  const nameW=130, colW=Math.min(60, (W-PAD*2-nameW-60)/(maxR||1)), totalW=70;
  const tableX=PAD;

  // Table header
  ctx.globalAlpha=0.15; ctx.fillStyle="#fff";
  roundRect(ctx,tableX,detY,W-PAD*2,TH,8); ctx.fill(); ctx.globalAlpha=1;
  ctx.fillStyle="rgba(255,255,255,0.7)"; ctx.font="bold 12px sans-serif";
  ctx.textAlign="left"; ctx.fillText("Joueur", tableX+10, detY+TH/2+5);
  for(let i=1;i<=maxR;i++){
    ctx.textAlign="center";
    ctx.fillText("M"+i, tableX+nameW+(i-0.5)*colW, detY+TH/2+5);
  }
  ctx.textAlign="right"; ctx.fillStyle="#FFD700";
  ctx.fillText("Total", tableX+(W-PAD*2)-4, detY+TH/2+5);

  // Table rows
  s.players.forEach((p,pi)=>{
    const ry=detY+TH+pi*DET_ROW;
    if(pi%2===0){ ctx.globalAlpha=0.06; ctx.fillStyle="#fff"; ctx.fillRect(tableX,ry,W-PAD*2,DET_ROW); ctx.globalAlpha=1; }
    ctx.fillStyle="#fff"; ctx.font="13px sans-serif"; ctx.textAlign="left";
    ctx.fillText(p.emoji+" "+p.name, tableX+10, ry+DET_ROW/2+5);
    let rowTotal=0;
    for(let i=1;i<=maxR;i++){
      const entry=isObj?p.scores.find(sc=>sc.r===i):null;
      const v=entry?entry.v:(isObj?undefined:p.scores[i-1]);
      ctx.font="12px monospace"; ctx.textAlign="center";
      if(v!==undefined){
        ctx.fillStyle=v<0?"#ff9999":"rgba(255,255,255,0.9)";
        ctx.fillText((v>0?"+":"")+v, tableX+nameW+(i-0.5)*colW, ry+DET_ROW/2+5);
        rowTotal+=v;
      } else {
        ctx.fillStyle="rgba(255,255,255,0.3)";
        ctx.fillText("—", tableX+nameW+(i-0.5)*colW, ry+DET_ROW/2+5);
      }
    }
    ctx.font="bold 14px monospace"; ctx.textAlign="right";
    ctx.fillStyle="#FFD700";
    ctx.fillText(rowTotal, tableX+(W-PAD*2)-4, ry+DET_ROW/2+5);
  });

  // Footer
  ctx.fillStyle="rgba(255,255,255,0.4)"; ctx.font="12px sans-serif"; ctx.textAlign="center";
  ctx.fillText("ScoreKeeper", W/2, H-18);

  // Export
  canvas.toBlob(blob=>{
    if(!blob)return;
    const file=new File([blob],"scorekeeper-"+s.gameName+".png",{type:"image/png"});
    if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
      navigator.share({title:s.gameName+" — Résultats",files:[file]}).catch(()=>fallbackShare(canvas,s,sorted));
    } else {
      fallbackShare(canvas,s,sorted);
    }
  },"image/png");
}

function fallbackShare(canvas,s,sorted){
  // Show image in modal with download link
  showModal((sheet,close)=>{
    sheet.appendChild(div("mtitle","📸 Image du classement"));
    const img=document.createElement("img");
    img.src=canvas.toDataURL("image/png");
    img.style.cssText="width:100%;border-radius:14px;margin-bottom:14px;box-shadow:0 4px 20px rgba(0,0,0,0.2)";
    sheet.appendChild(img);
    const dl=document.createElement("a");
    dl.href=canvas.toDataURL("image/png");
    dl.download="scorekeeper-"+s.gameName+".png";
    dl.className="btn btn-p btn-full";
    dl.style.textDecoration="none";
    dl.textContent="⬇️ Télécharger l'image";
    sheet.appendChild(dl);
    const tb=btn("btn btn-s btn-full","✕ Fermer",close);
    tb.style.marginTop="8px";
    sheet.appendChild(tb);
  });
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

let statsView="games";
function buildStats(pg){
  pg.innerHTML="";
  const wrap=div("inner");
  pg.appendChild(wrap);
  const hdr=div("hdr");
  hdr.innerHTML=`<div><h1>Statistiques</h1><div class="sub">${D.sessions.length} parties</div></div>`;
  wrap.appendChild(hdr);
  if(!D.sessions.length){
    const em=div("empty");
    em.innerHTML=`<div class="empty-ico">\ud83d\udcca</div><div style="font-weight:700;font-size:18px">Pas encore de stats</div><div style="font-size:14px;color:var(--muted)">Jouez des parties pour voir vos statistiques.</div>`;
    wrap.appendChild(em);return;
  }
  const tb=div("tabbar");
  ["games","players"].forEach(t=>{
    const b=el("button","tab"+(statsView===t?" on":""),t==="games"?"Par jeu":"Par joueur");
    b.onclick=()=>{statsView=t;buildStats(pg)};
    tb.appendChild(b);
  });
  wrap.appendChild(tb);

  if(statsView==="games"){
    const map={};
    D.sessions.forEach(s=>{
      if(!map[s.gameName])map[s.gameName]={name:s.gameName,played:0,players:{}};
      const g=map[s.gameName];g.played++;
      const sorted=[...s.players].sort((a,b)=>b.total-a.total);
      sorted.forEach((p,i)=>{
        if(!g.players[p.name])g.players[p.name]={scores:[],wins:0};
        g.players[p.name].scores.push(p.total);
        if(i===0)g.players[p.name].wins++;
      });
    });
    Object.values(map).forEach(g=>{
      const card=div("card");
      card.style.marginBottom="12px";
      const best=Object.entries(g.players).sort((a,b)=>b[1].wins-a[1].wins)[0];
      const avg=Object.entries(g.players).map(([n,p])=>({name:n,avg:p.scores.reduce((a,b)=>a+b,0)/p.scores.length})).sort((a,b)=>b.avg-a.avg);
      let html=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px"><div style="font-size:17px;font-weight:700">${esc(g.name)}</div><div class="badge ba">${g.played} partie${g.played>1?"s":""}</div></div>`;
      if(best)html+=`<div style="background:var(--accent-lt);border:none;border-radius:14px;padding:10px 13px;margin-bottom:11px"><div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px">Meilleur joueur</div><div style="font-weight:700;font-size:14px">\ud83c\udfc6 ${esc(best[0])} — ${best[1].wins} victoire${best[1].wins>1?"s":""}</div></div>`;
      html+=`<div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px">Score moyen</div>`;
      avg.forEach(({name,avg},i)=>{
        html+=`<div style="display:flex;align-items:center;gap:9px;margin-bottom:5px"><div style="width:18px;font-size:12px;color:var(--muted)">${i+1}.</div><div style="flex:1;font-size:14px">${esc(name)}</div><div style="font-family:SFMono-Regular,Consolas,Liberation Mono,monospace;font-size:14px;color:${avg>=0?"var(--accent)":"#dc2626"}">${avg.toFixed(1)}</div></div>`;
      });
      card.innerHTML=html;
      wrap.appendChild(card);
    });
  }

  if(statsView==="players"){
    const map={};
    D.players.forEach(p=>{map[p.name]={...p,played:0,wins:0,total:0,gameWins:{}}});
    D.sessions.forEach(s=>{
      const sorted=[...s.players].sort((a,b)=>b.total-a.total);
      sorted.forEach((p,i)=>{
        if(!map[p.name])map[p.name]={...p,played:0,wins:0,total:0,gameWins:{}};
        const m=map[p.name];m.played++;m.total+=p.total;
        if(i===0){m.wins++;m.gameWins[s.gameName]=(m.gameWins[s.gameName]||0)+1;}
      });
    });
    Object.values(map).filter(p=>p.played>0).sort((a,b)=>b.wins-a.wins).forEach((p,i)=>{
      const wr=p.played>0?Math.round(p.wins/p.played*100):0;
      const fav=Object.entries(p.gameWins).sort((a,b)=>b[1]-a[1])[0];
      const card=div("card");card.style.marginBottom="12px";
      let html=`<div style="display:flex;align-items:center;gap:11px;margin-bottom:13px">
        <div class="${avClass(p)}" style="width:42px;height:42px;font-size:20px;border-radius:13px">${esc(p.emoji)}</div>
        <div><div style="font-size:17px;font-weight:700">${esc(p.name)}</div><div style="font-size:12px;color:var(--muted)">${p.played} partie${p.played>1?"s":""}</div></div>
        ${i===0?`<div class="badge ba" style="margin-left:auto">Top joueur</div>`:""}
      </div>
      <div class="g3" style="margin-bottom:11px">
        <div class="stat-card"><div class="sv">${p.wins}</div><div class="sl">Victoires</div></div>
        <div class="stat-card"><div class="sv">${wr}%</div><div class="sl">Win rate</div></div>
        <div class="stat-card"><div class="sv" style="font-size:22px">${p.played>0?Math.round(p.total/p.played):0}</div><div class="sl">Moy.</div></div>
      </div>
      ${fav?`<div style="font-size:13px;color:var(--muted)">\ud83c\udfae Meilleur à : <strong style="color:var(--text)">${esc(fav[0])}</strong> (${fav[1]} victoire${fav[1]>1?"s":""})</div>`:""}`;
      card.innerHTML=html;
      wrap.appendChild(card);
    });
  }
}

  syncCard.appendChild(impBtn);

    if(confirm("Effacer tout l'historique ? Irréversible."))upd(d=>({...d,sessions:[],current:null}));
  });
